<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mmes - Moyenne à la Maison</title>
    <style>
        :root {
            --bg-space: #05050d; /* Noir profond de l'espace */
            --panel-bg: rgba(13, 17, 33, 0.75); /* Bleu nuit translucide */
            --neon-blue: #00f0ff; /* Bleu électrique futuriste */
            --text-main: #ffffff; /* Blanc pur */
            --text-muted: #8fa0dd; /* Bleu-gris adouci */
            --border-glow: rgba(0, 240, 255, 0.25);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-space);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            position: relative;
            overflow-x: hidden;
        }

        /* Arrière-plan d'étoiles animées */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: 
                radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 150px 40px, #00f0ff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 250px 180px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 80px 240px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 320px 120px, #00f0ff, rgba(0,0,0,0));
            background-size: 400px 400px;
            animation: moveStars 120s linear infinite;
            z-index: 0;
        }

        @keyframes moveStars {
            from { background-position: 0 0; }
            to { background-position: 400px 800px; }
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            max-width: 650px;
            z-index: 1;
        }

        header h1 {
            color: var(--text-main);
            font-size: 2.8rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 6px;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
            font-weight: 800;
        }

        header p {
            font-size: 0.95rem;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 8px 0 0 0;
            opacity: 0.8;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.1);
            border: 1px solid var(--border-glow);
            box-sizing: border-box;
            z-index: 1;
        }

        .selectors {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        label {
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            display: block;
            color: var(--text-muted);
        }

        select {
            width: 100%;
            padding: 12px;
            background-color: rgba(5, 5, 13, 0.6);
            border: 1px solid var(--border-glow);
            border-radius: 8px;
            font-size: 1rem;
            color: var(--text-main);
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
            margin-bottom: 30px;
        }

        th {
            padding: 10px 12px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-blue);
            border-bottom: 1px solid var(--border-glow);
            text-align: left;
        }

        th:nth-child(2), td:nth-child(2), th:nth-child(3), td:nth-child(3) {
            text-align: center;
        }

        tr td {
            padding: 10px 12px;
            background-color: rgba(255, 255, 255, 0.03);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tr td:first-child {
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-top-left-radius: 8px;
            border-bottom-left-radius: 8px;
            font-weight: 500;
        }

        tr td:last-child {
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            border-top-right-radius: 8px;
            border-bottom-right-radius: 8px;
        }

        input[type="number"] {
            width: 75px;
            padding: 8px;
            background-color: rgba(5, 5, 13, 0.8);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 6px;
            font-size: 1rem;
            color: var(--text-main);
            text-align: center;
            outline: none;
            transition: all 0.2s;
        }

        input[type="number"]:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 8px rgba(0, 240, 255, 0.4);
            background-color: rgba(5, 5, 13, 1);
        }

        .btn-calc {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.2) 0%, rgba(0, 110, 255, 0.2) 100%);
            color: var(--text-main);
            border: 1px solid var(--neon-blue);
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.1);
        }

        .btn-calc:hover {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.3) 0%, rgba(0, 110, 255, 0.3) 100%);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
            transform: translateY(-1px);
        }

        .btn-calc:active {
            transform: translateY(1px);
        }

        .result-box {
            margin-top: 30px;
            padding: 22px;
            border-radius: 8px;
            text-align: center;
            font-size: 1.6rem;
            font-weight: bold;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.15);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
            letter-spacing: 1px;
            display: none;
        }

        .result-box.nc {
            background: rgba(255, 0, 85, 0.05);
            border-color: rgba(255, 0, 85, 0.4);
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.15);
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
            color: #ff4171;
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <header>
        <h1>Mmes</h1>
        <p>Moyenne à la Maison</p>
    </header>

    <div class="container">
        <div class="selectors">
            <div>
                <label for="classe">Classe</label>
                <select id="classe" onchange="GérerChangementClasse()">
                    <option value="6eme">6ème</option>
                    <option value="5eme">5ème</option>
                    <option value="4eme">4ème</option>
                    <option value="3eme">3ème</option>
                    <option value="seconde">Seconde</option>
                    <option value="premiere">Première</option>
                    <option value="terminale">Terminale</option>
                </select>
            </div>
            <div id="box-serie" style="display: none;">
                <label for="serie">Série</label>
                <select id="serie" onchange="GérerChangementClasse()">
                    <!-- Injecté par JS -->
                </select>
            </div>
        </div>

        <table id="table-matieres">
            <thead>
                <tr>
                    <th>Matière</th>
                    <th>Coefficient</th>
                    <th>Note / 20</th>
                </tr>
            </thead>
            <tbody id="corps-table">
                <!-- Rempli dynamiquement par JS -->
            </tbody>
        </table>

        <button class="btn-calc" onclick="CalculerMoyenne()">Calculer la Moyenne</button>

        <div id="resultat" class="result-box"></div>
    </div>

    <script>
        const matieresCollegeBase = ["Français", "Mathématiques", "Physique-Chimie", "SVT", "Anglais", "Informatique", "Histoire-Géographie", "EDHC", "EPS", "Conduite"];
        
        function générerMatieres() {
            const classe = document.getElementById("classe").value;
            const serieBox = document.getElementById("box-serie");
            const serie = document.getElementById("serie").value;
            const corps = document.getElementById("corps-table");
            
            corps.innerHTML = "";
            let listeMatieres = [];

            if (["6eme", "5eme", "4eme", "3eme"].includes(classe)) {
                serieBox.style.display = "none";
                listeMatieres = [...matieresCollegeBase];
                if (classe === "4eme" || classe === "3eme") {
                    listeMatieres.push("Espagnol", "Allemand");
                }
            } else {
                serieBox.style.display = "block";
                let baseLycee = ["Français", "Mathématiques", "Physique-Chimie", "SVT", "Anglais", "Histoire-Géographie", "EPS", "Conduite"];
                
                if (classe === "premiere" || classe === "terminale") {
                    baseLycee.unshift("Philosophie"); 
                }

                if (serie === "A") {
                    baseLycee.push("Espagnol", "Allemand");
                }

                listeMatieres = baseLycee;
            }

            listeMatieres.forEach((mat, index) => {
                let row = document.createElement("tr");
                
                let cellNom = document.createElement("td");
                cellNom.textContent = mat;
                row.appendChild(cellNom);

                let cellCoef = document.createElement("td");
                let defaultCoef = ["6eme", "5eme", "4eme", "3eme"].includes(classe) ? 1 : 2;
                cellCoef.innerHTML = `<input type="number" id="coef-${index}" value="${defaultCoef}" min="1" max="10">`;
                row.appendChild(cellCoef);

                let cellNote = document.createElement("td");
                cellNote.innerHTML = `<input type="number" id="note-${index}" step="0.25" min="0" max="20" placeholder="--">`;
                row.appendChild(cellNote);

                corps.appendChild(row);
            });
        }

        function GérerChangementClasse() {
            const classe = document.getElementById("classe").value;
            const serieBox = document.getElementById("box-serie");
            const serieSelect = document.getElementById("serie");

            if (classe === "seconde") {
                serieBox.style.display = "block";
                serieSelect.innerHTML = '<option value="A">Série A</option><option value="C">Série C</option>';
            } else if (classe === "premiere" || classe === "terminale") {
                serieBox.style.display = "block";
                serieSelect.innerHTML = '<option value="A">Série A</option><option value="C">Série C</option><option value="D">Série D</option>';
            } else {
                serieBox.style.display = "none";
            }
            
            générerMatieres();
            document.getElementById("resultat").style.display = "none";
        }

        function CalculerMoyenne() {
            const corps = document.getElementById("corps-table");
            const rows = corps.querySelectorAll("tr");
            
            let totalPoints = 0;
            let totalCoefs = 0;
            let aDesNotes = false;
            let caseVideDetectee = false;

            rows.forEach((row, index) => {
                const noteInput = document.getElementById(`note-${index}`);
                const coefInput = document.getElementById(`coef-${index}`);
                
                let noteVal = noteInput.value.trim();
                let coef = parseFloat(coefInput.value) || 1;

                if (noteVal === "") {
                    caseVideDetectee = true;
                } else {
                    let note = parseFloat(noteVal);
                    if (!isNaN(note) && note >= 0 && note <= 20) {
                        totalPoints += note * coef;
                        totalCoefs += coef;
                        aDesNotes = true;
                    }
                }
            });

            const resultBox = document.getElementById("resultat");
            resultBox.style.display = "block";

            if (caseVideDetectee || !aDesNotes) {
                resultBox.textContent = "SYSTEM STATUS : MC (NON CLASSÉ)";
                resultBox.className = "result-box nc";
            } else {
                let moyenne = totalPoints / totalCoefs;
                resultBox.textContent = `MOYENNE GÉNÉRALE : ${moyenne.toFixed(2)} / 20`;
                resultBox.className = "result-box";
            }
        }

        GérerChangementClasse();
    </script>
</body>
</html>
