<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mmes - Moyenne à la Maison</title>
    <style>
        :root {
            --primary: #2d5a27; /* Vert tableau d'école */
            --secondary: #d9a05b; /* Couleur bois/crayon */
            --bg: #fdfaf6; /* Couleur papier/cahier */
            --text: #333;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 4px dashed var(--secondary);
            padding-bottom: 10px;
            width: 100%;
            max-width: 800px;
        }

        header h1 {
            color: var(--primary);
            margin: 0;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header p {
            font-style: italic;
            color: #666;
            margin: 5px 0 0 0;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            border: 1px solid #e0e0e0;
        }

        .selectors {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            color: var(--primary);
        }

        select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        select:focus {
            border-color: var(--primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: var(--primary);
            color: white;
        }

        th:nth-child(2), td:nth-child(2), th:nth-child(3), td:nth-child(3) {
            text-align: center;
        }

        input[type="number"] {
            width: 80px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }

        .btn-calc {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-calc:hover {
            background-color: #1e3d1a;
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 6px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            background-color: #eef5ed;
            border-left: 6px solid var(--primary);
            display: none;
        }

        .result-box.nc {
            background-color: #fbeeed;
            border-left-color: #d9534f;
            color: #d9534f;
        }
    </style>
</head>
<body>

    <header>
        <h1>Mmes</h1>
        <p>Moyenne à la Maison</p>
    </header>

    <div class="container">
        <div class="selectors">
            <div>
                <label for="classe">Classe :</label>
                <select id="classe" onchange="GérerChangementClasse()">
                    <option value="6eme">6ème</option>
                    <option value="5eme">5ème</option>
                    <option value="4eme">4ème</option>
                    <option value="3eme">3ème</option>
                    <option value="seconde">Seconde</option>
                    <option value="premiere">Première</option>
                    <option value="terminale">Terminale</option>
                </select>
            </div>
            <div id="box-serie" style="display: none;">
                <label for="serie">Série :</label>
                <select id="serie" onchange="GérerChangementClasse()">
                    </select>
            </div>
        </div>

        <table id="table-matieres">
            <thead>
                <tr>
                    <th>Matière</th>
                    <th>Coefficient</th>
                    <th>Note /20</th>
                </tr>
            </thead>
            <tbody id="corps-table">
                </tbody>
        </table>

        <button class="btn-calc" onclick="CalculerMoyenne()">Calculer ma Moyenne</button>

        <div id="resultat" class="result-box"></div>
    </div>

    <script>
        const matieresCollegeBase = ["Français", "Mathématiques", "Physique-Chimie", "SVT", "Anglais", "Informatique", "Histoire-Géographie", "EDHC", "EPS", "Conduite"];
        
        function générerMatieres() {
            const classe = document.getElementById("classe").value;
            const serieBox = document.getElementById("box-serie");
            const serie = document.getElementById("serie").value;
            const corps = document.getElementById("corps-table");
            
            corps.innerHTML = "";
            let listeMatieres = [];

            // Logique Collège
            if (["6eme", "5eme", "4eme", "3eme"].includes(classe)) {
                serieBox.style.display = "none";
                listeMatieres = [...matieresCollegeBase];
                if (classe === "4eme" || classe === "3eme") {
                    listeMatieres.push("Espagnol", "Allemand");
                }
            } 
            // Logique Lycée
            else {
                serieBox.style.display = "block";
                let baseLycee = ["Français", "Mathématiques", "Physique-Chimie", "SVT", "Anglais", "Histoire-Géographie", "EPS", "Conduite"];
                
                if (classe === "premiere" || classe === "terminale") {
                    baseLycee.unshift("Philosophie"); 
                }

                if (serie === "A") {
                    baseLycee.push("Espagnol", "Allemand");
                }

                listeMatieres = baseLycee;
            }

            // Injection dans le DOM
            listeMatieres.forEach((mat, index) => {
                let row = document.createElement("tr");
                
                let cellNom = document.createElement("td");
                cellNom.textContent = mat;
                row.appendChild(cellNom);

                // La colonne coefficient s'affiche partout désormais
                let cellCoef = document.createElement("td");
                let defaultCoef = ["6eme", "5eme", "4eme", "3eme"].includes(classe) ? 1 : 2;
                cellCoef.innerHTML = `<input type="number" id="coef-${index}" value="${defaultCoef}" min="1" max="10">`;
                row.appendChild(cellCoef);

                let cellNote = document.createElement("td");
                cellNote.innerHTML = `<input type="number" id="note-${index}" step="0.25" min="0" max="20" placeholder="Note">`;
                row.appendChild(cellNote);

                corps.appendChild(row);
            });
        }

        function GérerChangementClasse() {
            const classe = document.getElementById("classe").value;
            const serieBox = document.getElementById("box-serie");
            const serieSelect = document.getElementById("serie");

            if (classe === "seconde") {
                serieBox.style.display = "block";
                serieSelect.innerHTML = '<option value="A">Série A</option><option value="C">Série C</option>';
            } else if (classe === "premiere" || classe === "terminale") {
                serieBox.style.display = "block";
                serieSelect.innerHTML = '<option value="A">Série A</option><option value="C">Série C</option><option value="D">Série D</option>';
            } else {
                serieBox.style.display = "none";
            }
            
            générerMatieres();
            document.getElementById("resultat").style.display = "none";
        }

        function CalculerMoyenne() {
            const corps = document.getElementById("corps-table");
            const rows = corps.querySelectorAll("tr");
            
            let totalPoints = 0;
            let totalCoefs = 0;
            let aDesNotes = false;
            let caseVideDetectee = false;

            rows.forEach((row, index) => {
                const noteInput = document.getElementById(`note-${index}`);
                const coefInput = document.getElementById(`coef-${index}`);
                
                let noteVal = noteInput.value.trim();
                let coef = parseFloat(coefInput.value) || 1;

                if (noteVal === "") {
                    caseVideDetectee = true;
                } else {
                    let note = parseFloat(noteVal);
                    if (!isNaN(note) && note >= 0 && note <= 20) {
                        totalPoints += note * coef;
                        totalCoefs += coef;
                        aDesNotes = true;
                    }
                }
            });

            const resultBox = document.getElementById("resultat");
            resultBox.style.display = "block";

            if (caseVideDetectee || !aDesNotes) {
                resultBox.textContent = "Moyenne Générale : MC (Non Classé)";
                resultBox.className = "result-box nc";
            } else {
                let moyenne = totalPoints / totalCoefs;
                resultBox.textContent = `Moyenne Générale : ${moyenne.toFixed(2)} / 20`;
                resultBox.className = "result-box";
            }
        }

        GérerChangementClasse();
    </script>
</body>
</html>
