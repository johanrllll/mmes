<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mmes - Bulletin Annuel</title>
    <style>
        :root {
            --primary: #2d5a27; /* Vert tableau d'école */
            --secondary: #d9a05b; /* Couleur bois/crayon */
            --bg: #fdfaf6; /* Couleur papier/cahier */
            --text: #333;
            --card-bg: #ffffff;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 4px dashed var(--secondary);
            padding-bottom: 10px;
            width: 100%;
            max-width: 950px;
        }

        header h1 {
            color: var(--primary);
            margin: 0;
            font-size: 2.3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header p {
            font-style: italic;
            color: #666;
            margin: 5px 0 0 0;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            border: 1px solid #e0e0e0;
            box-sizing: border-box;
        }

        .selectors {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            color: var(--primary);
        }

        select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
        }

        select:focus {
            border-color: var(--primary);
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: var(--primary);
            color: white;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        th:not(:first-child), td:not(:first-child) {
            text-align: center;
        }

        .avg-row {
            background-color: #f1f7f0;
            font-weight: bold;
            border-top: 2px solid var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        .avg-row td {
            padding: 14px 10px;
            color: var(--primary);
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        input[type="number"] {
            width: 65px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }

        .btn-calc {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-calc:hover {
            background-color: #1e3d1a;
        }

        .annual-panel {
            margin-top: 25px;
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            background-color: #f8fafc;
            border: 2px solid #e2e8f0;
            display: none;
        }

        .annual-title {
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 5px;
        }

        .annual-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 15px;
        }

        .badge {
            display: inline-block;
            padding: 8px 25px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .badge.pass {
            background-color: #d1fae5;
            color: var(--success);
        }

        .badge.fail {
            background-color: #fee2e2;
            color: var(--danger);
        }

        .badge.nc {
            background-color: #e2e8f0;
            color: #475569;
        }
    </style>
</head>
<body>

    <header>
        <h1>Mmes</h1>
        <p>Carnet de Notes Annuel</p>
    </header>

    <div class="container">
        <div class="selectors">
            <div>
                <label for="classe">Classe :</label>
                <select id="classe" onchange="GérerChangementClasse()">
                    <option value="6eme">6ème</option>
                    <option value="5eme">5ème</option>
                    <option value="4eme">4ème</option>
                    <option value="3eme">3ème</option>
                    <option value="seconde">Seconde</option>
                    <option value="premiere">Première</option>
                    <option value="terminale">Terminale</option>
                </select>
            </div>
            <div id="box-serie" style="display: none;">
                <label for="serie">Série :</label>
                <select id="serie" onchange="GérerChangementSerie()">
                    </select>
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Matière</th>
                        <th>Coef</th>
                        <th>Trimestre 1</th>
                        <th>Trimestre 2</th>
                        <th>Trimestre 3</th>
                    </tr>
                </thead>
                <tbody id="corps-table">
                    </tbody>
                <tfoot>
                    <tr class="avg-row">
                        <td>Moyenne Trimestrielle</td>
                        <td>-</td>
                        <td id="avg-t1">-</td>
                        <td id="avg-t2">-</td>
                        <td id="avg-t3">-</td>
                    </tr>
                </tfoot>
            </table>
        </div>

        <button class="btn-calc" onclick="CalculerTout()">Calculer le Bilan Annuel</button>

        <div id="panel-annuel" class="annual-panel">
            <div class="annual-title">Moyenne Générale Annuelle</div>
            <div id="valeur-annuelle" class="annual-value">--.-- / 20</div>
            <div id="badge-decision" class="badge">STATUT</div>
        </div>
    </div>

    <script>
        const matieresBase = ["Français", "Mathématiques", "Physique-Chimie", "SVT", "Anglais", "Informatique", "Histoire-Géographie", "EDHC", "EPS", "Conduite"];

        function générerMatieres() {
            const classe = document.getElementById("classe").value;
            const serieBox = document.getElementById("box-serie");
            const serie = document.getElementById("serie").value;
            const corps = document.getElementById("corps-table");
            
            corps.innerHTML = "";
            let listeMatieres = [];

            if (["6eme", "5eme", "4eme", "3eme"].includes(classe)) {
                serieBox.style.display = "none";
                listeMatieres = [...matieresBase];
                if (classe === "4eme" || classe === "3eme") {
                    listeMatieres.push("Espagnol", "Allemand");
                }
            } else {
                serieBox.style.display = "block";
                let baseLycee = ["Français", "Mathématiques", "Physique-Chimie", "SVT", "Anglais", "Histoire-Géographie", "EPS", "Conduite"];
                
                if (classe === "premiere" || classe === "terminale") {
                    baseLycee.unshift("Philosophie"); 
                }
                if (serie === "A") {
                    baseLycee.push("Espagnol", "Allemand");
                }
                listeMatieres = baseLycee;
            }

            listeMatieres.forEach((mat, index) => {
                let row = document.createElement("tr");
                
                let cellNom = document.createElement("td");
                cellNom.textContent = mat;
                row.appendChild(cellNom);

                let cellCoef = document.createElement("td");
                let defaultCoef = ["6eme", "5eme", "4eme", "3eme"].includes(classe) ? 1 : 2;
                cellCoef.innerHTML = `<input type="number" id="coef-${index}" value="${defaultCoef}" min="1" max="10" oninput="recalculerAutomatique()">`;
                row.appendChild(cellCoef);

                let cellT1 = document.createElement("td");
                cellT1.innerHTML = `<input type="number" id="note-t1-${index}" step="0.25" min="0" max="20" placeholder="--" oninput="recalculerAutomatique()">`;
                row.appendChild(cellT1);

                let cellT2 = document.createElement("td");
                cellT2.innerHTML = `<input type="number" id="note-t2-${index}" step="0.25" min="0" max="20" placeholder="--" oninput="recalculerAutomatique()">`;
                row.appendChild(cellT2);

                let cellT3 = document.createElement("td");
                cellT3.innerHTML = `<input type="number" id="note-t3-${index}" step="0.25" min="0" max="20" placeholder="--" oninput="recalculerAutomatique()">`;
                row.appendChild(cellT3);

                corps.appendChild(row);
            });
            
            recalculerAutomatique();
        }

        function GérerChangementClasse() {
            const classe = document.getElementById("classe").value;
            const serieBox = document.getElementById("box-serie");
            const serieSelect = document.getElementById("serie");

            if (classe === "seconde") {
                serieBox.style.display = "block";
                serieSelect.innerHTML = '<option value="A">Série A</option><option value="C">Série C</option>';
            } else if (classe === "premiere" || classe === "terminale") {
                serieBox.style.display = "block";
                serieSelect.innerHTML = '<option value="A">Série A</option><option value="C">Série C</option><option value="D">Série D</option>';
            } else {
                serieBox.style.display = "none";
            }
            
            générerMatieres();
            document.getElementById("panel-annuel").style.display = "none";
        }

        function GérerChangementSerie() {
            générerMatieres();
            document.getElementById("panel-annuel").style.display = "none";
        }

        function calculerMoyenneTrimestre(prefix) {
            const rows = document.querySelectorAll("#corps-table tr");
            let points = 0;
            let coefs = 0;
            let vide = false;
            let aDesNotes = false;

            rows.forEach((row, index) => {
                const noteIn = document.getElementById(`note-${prefix}-${index}`);
                const coefIn = document.getElementById(`coef-${index}`);
                
                let noteVal = noteIn.value.trim();
                let coef = parseFloat(coefIn.value) || 1;

                if (noteVal === "") {
                    vide = true;
                } else {
                    let note = parseFloat(noteVal);
                    if (!isNaN(note) && note >= 0 && note <= 20) {
                        points += note * coef;
                        coefs += coef;
                        aDesNotes = true;
                    }
                }
            });

            if (vide || !aDesNotes) return null;
            return points / coefs;
        }

        function recalculerAutomatique() {
            const m1 = calculerMoyenneTrimestre("t1");
            const m2 = calculerMoyenneTrimestre("t2");
            const m3 = calculerMoyenneTrimestre("t3");

            document.getElementById("avg-t1").textContent = m1 !== null ? m1.toFixed(2) : "MC";
            document.getElementById("avg-t2").textContent = m2 !== null ? m2.toFixed(2) : "MC";
            document.getElementById("avg-t3").textContent = m3 !== null ? m3.toFixed(2) : "MC";
        }

        function CalculerTout() {
            recalculerAutomatique();
            
            const m1 = calculerMoyenneTrimestre("t1");
            const m2 = calculerMoyenneTrimestre("t2");
            const m3 = calculerMoyenneTrimestre("t3");

            const panel = document.getElementById("panel-annuel");
            const valAnnuelle = document.getElementById("valeur-annuelle");
            const badge = document.getElementById("badge-decision");

            panel.style.display = "block";

            if (m1 === null || m2 === null || m3 === null) {
                valAnnuelle.textContent = "Bilan Incomplet";
                badge.textContent = "MC (Non Classé)";
                badge.className = "badge nc";
            } else {
                let moyenneAnnuelle = (m1 + m2 + m3) / 3;
                valAnnuelle.textContent = `${moyenneAnnuelle.toFixed(2)} / 20`;

                if (moyenneAnnuelle >= 10.00) {
                    badge.textContent = "PASSÉ";
                    badge.className = "badge pass";
                } else {
                    badge.textContent = "REFUSÉ";
                    badge.className = "badge fail";
                }
            }
        }

        GérerChangementClasse();
    </script>
</body>
</html>
