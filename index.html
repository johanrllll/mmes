<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mmes - Tableau de Bord Scolaire</title>
    <style>
        :root {
            --bg-dark: #0f172a; /* Bleu-noir ardoise très moderne */
            --card-bg: #ffffff; /* Cartes blanches pour un fort contraste */
            --text-dark: #1e293b;
            --text-light: #f8fafc;
            --primary-blue: #2563eb; /* Bleu percutant */
            --primary-hover: #1d4ed8;
            --success-green: #10b981; /* Vert réussite */
            --danger-red: #ef4444; /* Rouge refusé */
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            width: 100%;
            max-width: 650px;
        }

        header h1 {
            color: var(--text-light);
            font-size: 2.4rem;
            margin: 0;
            font-weight: 800;
            letter-spacing: -1px;
        }

        header p {
            font-size: 1rem;
            color: #94a3b8;
            margin: 5px 0 0 0;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            box-sizing: border-box;
        }

        .selectors-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        @media (max-width: 480px) {
            .selectors-grid {
                grid-template-columns: 1fr;
            }
        }

        label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            display: block;
            color: #64748b;
        }

        select {
            width: 100%;
            padding: 12px;
            background-color: #f8fafc;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-dark);
            outline: none;
            transition: all 0.2s ease;
        }

        select:focus {
            border-color: var(--primary-blue);
            background-color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
        }

        th {
            padding: 12px 10px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            border-bottom: 2px solid var(--border-color);
            text-align: left;
        }

        th:nth-child(2), td:nth-child(2), th:nth-child(3), td:nth-child(3) {
            text-align: center;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
            font-weight: 500;
        }

        input[type="number"] {
            width: 70px;
            padding: 8px;
            background-color: #f1f5f9;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-dark);
            text-align: center;
            outline: none;
            transition: all 0.2s;
        }

        input[type="number"]:focus {
            border-color: var(--primary-blue);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(37, 99, 117, 0.15);
        }

        .btn-calc {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .btn-calc:hover {
            background-color: var(--primary-hover);
        }

        .result-panel {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: none;
            background-color: #f8fafc;
            border: 1px solid var(--border-color);
        }

        .moyenne-text {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-badge.passe {
            background-color: #d1fae5;
            color: var(--success-green);
        }

        .status-badge.refuse {
            background-color: #fee2e2;
            color: var(--danger-red);
        }

        .status-badge.nc {
            background-color: #f1f5f9;
            color: #64748b;
        }
    </style>
</head>
<body>

    <header>
        <h1>Mmes</h1>
        <p>Gestionnaire de Moyennes Épuré</p>
    </header>

    <div class="container">
        <div class="selectors-grid">
            <div>
                <label for="classe">Classe</label>
                <select id="classe" onchange="changerConfiguration()">
                    <option value="6eme">6ème</option>
                    <option value="5eme">5ème</option>
                    <option value="4eme">4ème</option>
                    <option value="3eme">3ème</option>
                    <option value="seconde">Seconde</option>
                    <option value="premiere">Première</option>
                    <option value="terminale">Terminale</option>
                </select>
            </div>
            <div>
                <label for="trimestre">Trimestre</label>
                <select id="trimestre" onchange="chargerTrimestre()">
                    <option value="T1">1er Trimestre</option>
                    <option value="T2">2ème Trimestre</option>
                    <option value="T3">3ème Trimestre</option>
                </select>
            </div>
            <div id="box-serie" style="visibility: hidden;">
                <label for="serie">Série</label>
                <select id="serie" onchange="changerConfiguration()">
                    <!-- Injecté par JS -->
                </select>
            </div>
        </div>

        <table id="table-matieres">
            <thead>
                <tr>
                    <th>Matière</th>
                    <th>Coefficient</th>
                    <th>Note / 20</th>
                </tr>
            </thead>
            <tbody id="corps-table">
                <!-- Rempli par JS -->
            </tbody>
        </table>

        <button class="btn-calc" onclick="CalculerMoyenne()">Calculer le Bilan</button>

        <div id="resultat-panel" class="result-panel">
            <div id="moyenne-val" class="moyenne-text">00.00 / 20</div>
            <div id="status-badge" class="status-badge">Statut</div>
        </div>
    </div>

    <script>
        const matieresCollegeBase = ["Français", "Mathématiques", "Physique-Chimie", "SVT", "Anglais", "Informatique", "Histoire-Géographie", "EDHC", "EPS", "Conduite"];
        
        // Objet pour sauvegarder temporairement les notes saisies par l'utilisateur
        let memoireNotes = { T1: {}, T2: {}, T3: {} };

        function générerInterfaceMatieres() {
            const classe = document.getElementById("classe").value;
            const serieBox = document.getElementById("box-serie");
            const serie = document.getElementById("serie").value;
            const corps = document.getElementById("corps-table");
            const trimestre Actuel = document.getElementById("trimestre").value;
            
            corps.innerHTML = "";
            let listeMatieres = [];

            if (["6eme", "5eme", "4eme", "3eme"].includes(classe)) {
                serieBox.style.visibility = "hidden";
                listeMatieres = [...matieresCollegeBase];
                if (classe === "4eme" || classe === "3eme") {
                    listeMatieres.push("Espagnol", "Allemand");
                }
            } else {
                serieBox.style.visibility = "visible";
                let baseLycee = ["Français", "Mathématiques", "Physique-Chimie", "SVT", "Anglais", "Histoire-Géographie", "EPS", "Conduite"];
                
                if (classe === "premiere" || classe === "terminale") {
                    baseLycee.unshift("Philosophie"); 
                }
                if (serie === "A") {
                    baseLycee.push("Espagnol", "Allemand");
                }
                listeMatieres = baseLycee;
            }

            listeMatieres.forEach((mat, index) => {
                let row = document.createElement("tr");
                
                let cellNom = document.createElement("td");
                cellNom.textContent = mat;
                row.appendChild(cellNom);

                let cellCoef = document.createElement("td");
                let defaultCoef = ["6eme", "5eme", "4eme", "3eme"].includes(classe) ? 1 : 2;
                cellCoef.innerHTML = `<input type="number" id="coef-${index}" value="${defaultCoef}" min="1" max="10">`;
                row.appendChild(cellCoef);

                // Récupération de la note si elle était déjà enregistrée dans la mémoire pour ce trimestre
                let noteSauvegardee = memoireNotes[trimestreActuel][mat] || "";

                let cellNote = document.createElement("td");
                cellNote.innerHTML = `<input type="number" id="note-${index}" data-matiere="${mat}" step="0.25" min="0" max="20" placeholder="--" value="${noteSauvegardee}" oninput="sauvegarderNote('${mat}', this.value)">`;
                row.appendChild(cellNote);

                corps.appendChild(row);
            });
        }

        function sauvegarderNote(matiere, valeur) {
            const trimestreActuel = document.getElementById("trimestre").value;
            memoireNotes[trimestreActuel][matiere] = valeur;
        }

        function chargerTrimestre() {
            générerInterfaceMatieres();
            document.getElementById("resultat-panel").style.display = "none";
        }

        function changerConfiguration() {
            const classe = document.getElementById("classe").value;
            const serieSelect = document.getElementById("serie");

            if (classe === "seconde") {
                serieSelect.innerHTML = '<option value="A">Série A</option><option value="C">Série C</option>';
            } else if (classe === "premiere" || classe === "terminale") {
                serieSelect.innerHTML = '<option value="A">Série A</option><option value="C">Série C</option><option value="D">Série D</option>';
            }
            
            // Réinitialiser la mémoire lors d'un changement de classe ou série pour éviter les conflits de matières
            memoireNotes = { T1: {}, T2: {}, T3: {} };
            générerInterfaceMatieres();
            document.getElementById("resultat-panel").style.display = "none";
        }

        function CalculerMoyenne() {
            const corps = document.getElementById("corps-table");
            const rows = corps.querySelectorAll("tr");
            
            let totalPoints = 0;
            let totalCoefs = 0;
            let aDesNotes = false;
            let caseVideDetectee = false;

            rows.forEach((row, index) => {
                const noteInput = document.getElementById(`note-${index}`);
                const coefInput = document.getElementById(`coef-${index}`);
                
                let noteVal = noteInput.value.trim();
                let coef = parseFloat(coefInput.value) || 1;

                if (noteVal === "") {
                    caseVideDetectee = true;
                } else {
                    let note = parseFloat(noteVal);
                    if (!isNaN(note) && note >= 0 && note <= 20) {
                        totalPoints += note * coef;
                        totalCoefs += coef;
                        aDesNotes = true;
                    }
                }
            });

            const panel = document.getElementById("resultat-panel");
            const moyenneVal = document.getElementById("moyenne-val");
            const badge = document.getElementById("status-badge");
            
            panel.style.display = "block";

            if (caseVideDetectee || !aDesNotes) {
                moyenneVal.textContent = "Moyenne Indisponible";
                badge.textContent = "MC (Non Classé)";
                badge.className = "status-badge nc";
            } else {
                let moyenne = totalPoints / totalCoefs;
                moyenneVal.textContent = `${moyenne.toFixed(2)} / 20`;
                
                // Vérification de la condition de passage à 10.00
                if (moyenne >= 10.00) {
                    badge.textContent = "Passé";
                    badge.className = "status-badge passe";
                } else {
                    badge.textContent = "Refusé";
                    badge.className = "status-badge refuse";
                }
            }
        }

        // Initialisation par défaut
        changerConfiguration();
    </script>
</body>
</html>
